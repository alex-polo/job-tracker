[scheduler]
time_zone = "Europe/Moscow"

[rabbitmq]
connection_ttl = 60

[database]
database_path = "data/db.sqlite"
echo = false
echo_pool = false
autoflush = false
expire_on_commit = false

[scrapper.httpx_settings]
timeout = 30.0
follow_redirects = true
user_agent = "Mozilla/5.0 ..."
max_connections = 10
max_keepalive_connections = 5
verify = true
http2 = false

[[sources]]
source_type = "HH"
tag = "hh_fastapi"
# url = "https://hh.ru/search/vacancy?text=python&area=1&enable_snippets=true&items_on_page=50&order_by=publication_time"
url = "https://hh.ru/search/vacancy?text=FastAPI&salary=&ored_clusters=true&order_by=publication_time&enable_snippets=true&suggestId=6a9667aa-e61e-413b-8e4e-cc671e0f7419&hhtmFrom=vacancy_search_list&hhtmFromLabel=vacancy_search_line"
period_minutes=5

[scrapper.logging]
log_level = "INFO"
log_format = "%(asctime)s %(levelname)6s %(name)s: %(message)s"
log_date_format = "%Y-%m-%d %H:%M:%S"
directory = "logs"
log_file = "scrapper.log"

[tg_bot.logging]
log_level = "ERROR"
log_format = "%(asctime)s %(levelname)6s %(name)s: %(message)s"
log_date_format = "%Y-%m-%d %H:%M:%S"
directory = "logs"
log_file = "tg_bot.log"